# Pre-commit hooks configuration for Knowledge OS
# Install with: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Check for trailing whitespace
      - id: trailing-whitespace
      # Fix end of file
      - id: end-of-file-fixer
      # Check for merge conflict artifacts
      - id: check-merge-conflict
      # Check for added large files
      - id: check-added-large-files
        args: ['--maxkb=1000']
      # Check YAML syntax
      - id: check-yaml
      # Check for invalid UTF-8
      - id: check-encoding
      # Fix Python AST (syntax check)
      - id: check-ast

  # Code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.10
        # Only check Python files
        files: '\.py$'

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: '\.py$'
        args: ['--profile=black', '--multi-line=grid']

  # Linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [
          '--max-line-length=100',
          '--extend-ignore=E203,W503',
          '--per-file-ignores=__init__.py:F401'
        ]
        files: '\.py$'

  # Type checking (optional - uncomment if you want to run mypy)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       args: ['--ignore-missing-imports']
  #       files: '\.py$'
  #       exclude: 'tests/fixtures/.*'

# Configure CI to skip certain hooks
ci:
  skip:
    - trailing-whitespace  # Allow in CI since it auto-fixes